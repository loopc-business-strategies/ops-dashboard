name: Provision Staging Smoke Credentials

on:
  workflow_dispatch:

concurrency:
  group: provision-staging-smoke-credentials
  cancel-in-progress: true

jobs:
  provision:
    name: Create staging smoke users in tenant DBs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Provision staging smoke users
        env:
          MONGO_URI_MG: ${{ secrets.STAGING_MONGO_URI_MG }}
          MONGO_URI_CG: ${{ secrets.STAGING_MONGO_URI_CG }}
          MONGO_URI_LOOPC: ${{ secrets.STAGING_MONGO_URI_LOOPC }}
          SMOKE_API_BASE: ${{ vars.STAGING_SMOKE_API_BASE || 'https://ops-dashboard-staging-e6c6.up.railway.app' }}
          SMOKE_AUTH_NAME: ${{ secrets.STAGING_SMOKE_AUTH_NAME }}
          SMOKE_AUTH_PASSWORD: ${{ secrets.STAGING_SMOKE_AUTH_PASSWORD }}
        run: node scripts/setup-smoke-github-secrets.js --staging --users-only --skip-verify
