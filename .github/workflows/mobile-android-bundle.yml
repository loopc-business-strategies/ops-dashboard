# Build Nexa Android release AAB with local Gradle (no EAS). Linux paths avoid Windows 260-char Ninja limits.
name: Mobile Android bundle (local Gradle)

on:
  workflow_dispatch:

concurrency:
  group: mobile-android-bundle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    env:
      EXPO_PUBLIC_API_URL: https://api.loopcstrategies.com
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
      SENTRY_DISABLE_NATIVE_DEBUG_UPLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            ndk;27.1.12297006
            cmake;3.22.1

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Release readiness checks
        working-directory: mobile
        run: npm run check:release

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            KEYSTORE_PATH="mobile/android/app/release-upload.keystore"
            echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            {
              echo "storeFile=app/release-upload.keystore"
              echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
              echo "keyAlias=${ANDROID_KEY_ALIAS}"
              echo "keyPassword=${ANDROID_KEYSTORE_PASSWORD}"
            } > mobile/android/keystore.properties
            echo "Release signing configured from GitHub secrets."
          else
            echo "ANDROID_KEYSTORE_BASE64 not set — release AAB will use debug signing (internal QA only)."
            echo "For Play upload, add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS secrets."
          fi

      - name: Configure Firebase google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > mobile/android/app/google-services.json
            echo "google-services.json configured from GitHub secret."
          else
            echo "GOOGLE_SERVICES_JSON_BASE64 not set — FCM background push requires Firebase config. See docs/MOBILE-ANDROID-PUSH-FCM.md"
          fi

      - name: Make Gradle wrapper executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build release AAB
        working-directory: mobile
        run: npm run build:local:android:bundle

      - name: Build release APK
        working-directory: mobile
        run: npm run build:local:android:apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexa-android-release-aab
          path: mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexa-android-release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
