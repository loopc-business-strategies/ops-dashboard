name: Mongo Backup Mongodump

on:
  schedule:
    # 03:00 UTC every Sunday
    - cron: '0 3 * * 0'
  push:
    branches: [main]
    paths:
      - '.github/ops/trigger-mongo-backup-mongodump'
  workflow_dispatch:

concurrency:
  group: mongo-backup-mongodump
  cancel-in-progress: false

jobs:
  mongodump:
    name: mongodump tenants to S3
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ vars.MONGO_BACKUP_ENABLED == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend

      - name: Install MongoDB Database Tools
        run: |
          wget -qO - https://www.mongodb.org/static/pgp/server-8.0.asc | sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-8.0.gpg
          echo "deb [ signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/8.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools awscli

      - name: Run mongodump backup to R2
        if: ${{ vars.MONGO_BACKUP_S3_CONFIGURED == 'true' }}
        env:
          MONGO_URI_MG: ${{ secrets.MONGO_URI_MG }}
          MONGO_URI_CG: ${{ secrets.MONGO_URI_CG }}
          MONGO_URI_LOOPC: ${{ secrets.MONGO_URI_LOOPC }}
          BACKUP_S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_ACCESS_KEY: ${{ secrets.BACKUP_S3_ACCESS_KEY }}
          BACKUP_S3_SECRET_KEY: ${{ secrets.BACKUP_S3_SECRET_KEY }}
          BACKUP_S3_REGION: ${{ vars.BACKUP_S3_REGION || 'auto' }}
          BACKUP_S3_PREFIX: ${{ vars.BACKUP_S3_PREFIX || 'ops-dashboard' }}
          BACKUP_RETAIN_DAYS: ${{ vars.BACKUP_RETAIN_DAYS || '7' }}
        run: npm run backup:mongodump

      - name: Run mongodump backup to artifacts (interim until R2 configured)
        if: ${{ vars.MONGO_BACKUP_S3_CONFIGURED != 'true' }}
        env:
          MONGO_URI_MG: ${{ secrets.MONGO_URI_MG }}
          MONGO_URI_CG: ${{ secrets.MONGO_URI_CG }}
          MONGO_URI_LOOPC: ${{ secrets.MONGO_URI_LOOPC }}
          BACKUP_ARTIFACT_DIR: backup-artifacts
        run: npm run backup:mongodump

      - name: Upload backup artifacts
        if: ${{ vars.MONGO_BACKUP_S3_CONFIGURED != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: mongo-backup-${{ github.run_id }}
          path: backup-artifacts/*.archive.gz
          retention-days: 7
          if-no-files-found: error

  skipped-notice:
    name: Mongodump disabled
    runs-on: ubuntu-latest
    if: ${{ vars.MONGO_BACKUP_ENABLED != 'true' }}
    steps:
      - name: Notice
        run: |
          echo "MONGO_BACKUP_ENABLED is not true — skipping mongodump."
          echo "Set repo variable MONGO_BACKUP_ENABLED=true and S3/Mongo secrets to enable."
          echo "See docs/MONGODB-BACKUPS-AND-DATA-SAFETY.md"
