name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check forbidden tracked paths
        run: npm run check:tracked-paths

      - name: Check destructive script guards
        run: npm run check:destructive-guards

      - name: Check risk guardrails
        run: npm run check:risk-guardrails

      - name: Check Vercel rewrites
        run: npm run check:vercel-rewrites

      - name: Check ERP access policy parity
        run: |
          npm run sync:erp-access
          node scripts/check-access-policy-parity.mjs
          git diff --exit-code -- shared/erp-access-matrix.json backend/shared/erp-access-matrix.json frontend/src/generated/erp-access-matrix.json

  backend-fast-tests:
    name: Backend Fast Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Sync ERP access policy
        run: npm run sync:erp-access

      - name: Run backend fast tests
        working-directory: backend
        run: npm run test:fast

  backend-integration-tests:
    name: Backend Integration (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MONGOMS_DOWNLOAD_DIR: ~/.cache/mongodb-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: tenant-routing
            script: test:integration:tenant-routing
          - module: tenant-isolation
            script: test:integration:tenant-isolation
          - module: erp-accounting
            script: test:integration:erp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Cache MongoDB binaries for mongodb-memory-server
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-v1

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Sync ERP access policy
        run: npm run sync:erp-access

      - name: Run backend integration tests
        working-directory: backend
        run: npm run ${{ matrix.script }}

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync ERP access policy
        run: npm run sync:erp-access

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync ERP access policy
        run: npm run sync:erp-access

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check frontend bundle budget
        run: npm run check:frontend-bundle
