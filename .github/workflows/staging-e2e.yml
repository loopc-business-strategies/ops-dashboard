name: Staging E2E

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      wait_seconds:
        description: Seconds to wait before running Playwright against staging preview
        required: false
        default: '90'

concurrency:
  group: staging-e2e-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  staging-e2e:
    name: Playwright staging auth
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    timeout-minutes: 25
    env:
      STAGING_E2E_WAIT_SECONDS: ${{ vars.STAGING_E2E_WAIT_SECONDS || '90' }}
      STAGING_E2E_BASE_URL: ${{ vars.STAGING_E2E_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync ERP access policy
        run: npm run sync:erp-access

      - name: Wait for staging preview propagation
        run: |
          WAIT_SECONDS="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.wait_seconds || env.STAGING_E2E_WAIT_SECONDS }}"
          echo "Waiting ${WAIT_SECONDS}s for staging preview propagation..."
          sleep "${WAIT_SECONDS}"

      - name: Run staging authenticated Playwright tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.STAGING_E2E_BASE_URL || format('https://{0}', vars.STAGING_SMOKE_VERCEL_HOSTS) }}
          PLAYWRIGHT_VERCEL_BYPASS: ${{ secrets.STAGING_SMOKE_VERCEL_BYPASS }}
          E2E_AUTH_NAME: ${{ secrets.STAGING_SMOKE_AUTH_NAME }}
          E2E_AUTH_PASSWORD: ${{ secrets.STAGING_SMOKE_AUTH_PASSWORD }}
          E2E_AUTH_COMPANY: ${{ vars.STAGING_E2E_AUTH_COMPANY || 'loopc' }}
        run: npm run test:e2e:staging
