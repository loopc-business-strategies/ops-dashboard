name: Post-Deploy Tenant Smoke

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      wait_seconds:
        description: Seconds to wait before running smoke checks (for deploy propagation)
        required: false
        default: '180'

concurrency:
  group: post-deploy-tenant-smoke-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke-tenants:
    name: Smoke mg/cg/loopc
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SMOKE_BASE_DOMAIN: ${{ vars.SMOKE_BASE_DOMAIN || 'loopcstrategies.com' }}
      SMOKE_API_BASE: ${{ vars.SMOKE_API_BASE || 'https://api.loopcstrategies.com' }}
      SMOKE_WAIT_SECONDS: ${{ vars.SMOKE_WAIT_SECONDS || '180' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Wait for Vercel and Railway deployments
        run: |
          WAIT_SECONDS="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.wait_seconds || env.SMOKE_WAIT_SECONDS }}"
          echo "Waiting ${WAIT_SECONDS}s for production deploy propagation..."
          sleep "${WAIT_SECONDS}"

      - name: Run tenant smoke checks
        run: npm run smoke:tenants

      - name: Run production smoke (API + optional authenticated ERP)
        env:
          SMOKE_AUTH_NAME: ${{ secrets.SMOKE_AUTH_NAME }}
          SMOKE_AUTH_PASSWORD: ${{ secrets.SMOKE_AUTH_PASSWORD }}
          SMOKE_AUTH_TOKEN: ${{ secrets.SMOKE_AUTH_TOKEN }}
          SMOKE_SESSION_COOKIE: ${{ secrets.SMOKE_SESSION_COOKIE }}
          SMOKE_AUTH_NAME_MG: ${{ secrets.SMOKE_AUTH_NAME_MG }}
          SMOKE_AUTH_PASSWORD_MG: ${{ secrets.SMOKE_AUTH_PASSWORD_MG }}
          SMOKE_AUTH_NAME_CG: ${{ secrets.SMOKE_AUTH_NAME_CG }}
          SMOKE_AUTH_PASSWORD_CG: ${{ secrets.SMOKE_AUTH_PASSWORD_CG }}
          SMOKE_AUTH_NAME_LOOPC: ${{ secrets.SMOKE_AUTH_NAME_LOOPC }}
          SMOKE_AUTH_PASSWORD_LOOPC: ${{ secrets.SMOKE_AUTH_PASSWORD_LOOPC }}
          SMOKE_REQUIRE_AUTH: 'true'
        run: npm run smoke:prod

      - name: Install mobile dependencies for API smoke
        working-directory: mobile
        run: npm ci

      - name: Run mobile API smoke (JWT + X-Client mobile) — all tenants
        env:
          MOBILE_SMOKE_API_URL: ${{ vars.SMOKE_API_BASE || 'https://api.loopcstrategies.com' }}
          SMOKE_AUTH_NAME_MG: ${{ secrets.SMOKE_AUTH_NAME_MG }}
          SMOKE_AUTH_PASSWORD_MG: ${{ secrets.SMOKE_AUTH_PASSWORD_MG }}
          SMOKE_AUTH_NAME_CG: ${{ secrets.SMOKE_AUTH_NAME_CG }}
          SMOKE_AUTH_PASSWORD_CG: ${{ secrets.SMOKE_AUTH_PASSWORD_CG }}
          SMOKE_AUTH_NAME_LOOPC: ${{ secrets.SMOKE_AUTH_NAME_LOOPC }}
          SMOKE_AUTH_PASSWORD_LOOPC: ${{ secrets.SMOKE_AUTH_PASSWORD_LOOPC }}
          SMOKE_AUTH_NAME: ${{ secrets.SMOKE_AUTH_NAME }}
          SMOKE_AUTH_PASSWORD: ${{ secrets.SMOKE_AUTH_PASSWORD }}
        run: |
          smoke_tenant() {
            local company="$1"
            local name_var="SMOKE_AUTH_NAME_${company^^}"
            local pass_var="SMOKE_AUTH_PASSWORD_${company^^}"
            local name="${!name_var:-$SMOKE_AUTH_NAME}"
            local pass="${!pass_var:-$SMOKE_AUTH_PASSWORD}"
            if [ -z "$name" ] || [ -z "$pass" ]; then
              echo "Skipping mobile API smoke for $company — set SMOKE_AUTH_NAME_${company^^} or SMOKE_AUTH_NAME secrets."
              return 0
            fi
            echo "Mobile API smoke: $company"
            MOBILE_SMOKE_COMPANY="$company" \
            MOBILE_SMOKE_LOGIN_NAME="$name" \
            MOBILE_SMOKE_LOGIN_PASSWORD="$pass" \
            npm run smoke:mobile:api
          }
          smoke_tenant mg
          smoke_tenant cg
          smoke_tenant loopc
      - name: Notify Slack on smoke failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SMOKE_SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Slack webhook not configured; skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}"
          SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            --data "{\"text\":\"❌ Tenant smoke checks failed for ${GITHUB_REPOSITORY}\\nBranch: ${BRANCH}\\nSHA: ${SHA}\\nRun: ${RUN_URL}\"}"

      - name: Notify Teams on smoke failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.SMOKE_TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "Teams webhook not configured; skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}"
          SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

          curl -sS -X POST "$TEAMS_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            --data "{\"@type\":\"MessageCard\",\"@context\":\"http://schema.org/extensions\",\"summary\":\"Tenant smoke checks failed\",\"themeColor\":\"E74C3C\",\"title\":\"Tenant Smoke Failure\",\"text\":\"Repository: ${GITHUB_REPOSITORY}\\n\\nBranch: ${BRANCH}\\n\\nSHA: ${SHA}\\n\\nRun: ${RUN_URL}\"}"
