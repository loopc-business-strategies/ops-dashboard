name: Mongo Backup Drill

on:
  schedule:
    # 09:00 UTC on the 1st of Jan, Apr, Jul, Oct
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:

concurrency:
  group: mongo-backup-drill
  cancel-in-progress: false

jobs:
  connectivity-drill:
    name: Tenant Mongo connectivity + upload storage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify upload storage (prod + staging)
        run: npm run verify:upload-storage

      - name: Atlas backup drill (direct Mongo + snapshots when ATLAS_* secrets set)
        env:
          ATLAS_PUBLIC_KEY: ${{ secrets.ATLAS_PUBLIC_KEY }}
          ATLAS_PRIVATE_KEY: ${{ secrets.ATLAS_PRIVATE_KEY }}
          ATLAS_GROUP_ID_MG: ${{ secrets.ATLAS_GROUP_ID_MG }}
          ATLAS_GROUP_ID_CG: ${{ secrets.ATLAS_GROUP_ID_CG }}
          ATLAS_GROUP_ID_LOOPC: ${{ secrets.ATLAS_GROUP_ID_LOOPC }}
        run: npm run drill:atlas-backup-plan -- --strict-backup

      - name: Operator reminder
        run: |
          echo "Automated drill passed (connectivity + upload storage)."
          echo "Quarterly Atlas snapshot restore to a non-prod cluster is still manual:"
          echo "  docs/MONGODB-BACKUPS-AND-DATA-SAFETY.md"
