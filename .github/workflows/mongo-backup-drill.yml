name: Mongo Backup Drill

on:
  schedule:
    # 09:00 UTC on the 1st of Jan, Apr, Jul, Oct
    - cron: '0 9 1 1,4,7,10 *'
  push:
    branches: [main]
    paths:
      - '.github/ops/trigger-mongo-backup-drill'
  workflow_dispatch:
    inputs:
      phase:
        description: Backup verification phase (deferred = no Atlas M10+ required)
        required: false
        default: deferred
        type: choice
        options:
          - deferred
          - strict

concurrency:
  group: mongo-backup-drill
  cancel-in-progress: false

jobs:
  connectivity-drill:
    name: Tenant Mongo connectivity + upload storage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ATLAS_BACKUP_PHASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.phase || (github.event_name == 'push' && 'deferred') || vars.ATLAS_BACKUP_PHASE || 'deferred' }}
      ATLAS_RESTORE_DRILL_SKIP: 'true'
      SMOKE_API_BASE: ${{ vars.SMOKE_API_BASE || 'https://api.loopcstrategies.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend

      - name: Verify upload storage (prod + staging)
        run: npm run verify:upload-storage

      - name: Atlas backup drill
        env:
          ATLAS_PUBLIC_KEY: ${{ secrets.ATLAS_PUBLIC_KEY }}
          ATLAS_PRIVATE_KEY: ${{ secrets.ATLAS_PRIVATE_KEY }}
          ATLAS_GROUP_ID_MG: ${{ secrets.ATLAS_GROUP_ID_MG }}
          ATLAS_GROUP_ID_CG: ${{ secrets.ATLAS_GROUP_ID_CG }}
          ATLAS_GROUP_ID_LOOPC: ${{ secrets.ATLAS_GROUP_ID_LOOPC }}
          MONGO_URI_MG: ${{ secrets.MONGO_URI_MG }}
          MONGO_URI_CG: ${{ secrets.MONGO_URI_CG }}
          MONGO_URI_LOOPC: ${{ secrets.MONGO_URI_LOOPC }}
        run: |
          if [ "${{ env.ATLAS_BACKUP_PHASE }}" = "strict" ]; then
            npm run drill:atlas-backup-plan -- --strict-backup
          else
            npm run drill:atlas-backup-plan
          fi

      - name: Operator reminder
        run: |
          echo "Phase: ${{ env.ATLAS_BACKUP_PHASE }}"
          echo "Deferred phase passes without Atlas M10+ Cloud Backup subscription."
          echo "When subscribed: set ATLAS_BACKUP_PHASE=strict and Atlas API secrets."
          echo "Optional interim dumps: enable MONGO_BACKUP_ENABLED + mongo-backup-mongodump workflow."
          echo "  docs/MONGODB-BACKUPS-AND-DATA-SAFETY.md"
