name: Mongo Backup Drill

on:
  schedule:
    # 09:00 UTC on the 1st of Jan, Apr, Jul, Oct
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:

concurrency:
  group: mongo-backup-drill
  cancel-in-progress: false

jobs:
  connectivity-drill:
    name: Tenant Mongo connectivity + upload storage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify upload storage (prod + staging)
        run: npm run verify:upload-storage

      - name: Mongo tenant connectivity drill
        env:
          SMOKE_API_BASE: ${{ vars.SMOKE_API_BASE || 'https://api.loopcstrategies.com' }}
        run: npm run verify:mongo-backup-drill

      - name: Operator reminder
        run: |
          echo "Automated drill passed (connectivity + upload storage)."
          echo "Quarterly Atlas snapshot restore to a non-prod cluster is still manual:"
          echo "  docs/MONGODB-BACKUPS-AND-DATA-SAFETY.md"
