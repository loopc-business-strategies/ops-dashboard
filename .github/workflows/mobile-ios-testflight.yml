# Build Nexa iOS IPA on GitHub macOS (no EAS credits). Manual trigger from Windows.
name: Mobile iOS (GitHub macOS)

on:
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: Upload IPA to TestFlight after build
        type: boolean
        default: true

concurrency:
  group: mobile-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: read

    env:
      EXPO_PUBLIC_API_URL: https://api.loopcstrategies.com
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
      SENTRY_DISABLE_NATIVE_DEBUG_UPLOAD: "true"
      IOS_BUNDLE_ID: com.loopc.nexa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS IPA
        working-directory: mobile
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: chmod +x scripts/gha-ios-build.sh && ./scripts/gha-ios-build.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexa-ios-ipa
          path: mobile/build/export/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        if: ${{ inputs.upload_testflight }}
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: mobile/build/export/Nexa.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
