name: Provision Smoke Credentials

on:
  workflow_dispatch:

concurrency:
  group: provision-smoke-credentials
  cancel-in-progress: true

jobs:
  provision:
    name: Create smoke users + GitHub secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
      secrets: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Provision tenant smoke users and store GitHub secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MONGO_URI_MG: ${{ secrets.MONGO_URI_MG }}
          MONGO_URI_CG: ${{ secrets.MONGO_URI_CG }}
          MONGO_URI_LOOPC: ${{ secrets.MONGO_URI_LOOPC }}
          SMOKE_API_BASE: ${{ vars.SMOKE_API_BASE || 'https://api.loopcstrategies.com' }}
        run: node ../scripts/setup-smoke-github-secrets.js
